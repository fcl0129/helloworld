<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where Shall We Go? ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:    #EAE3D6;
      --sand-2:  #DDD6C8;
      --sand-3:  #D3CBBC;
      --ink:     #1A120A;
      --ink-2:   #574A42;
      --ink-3:   #9A8C84;
      --rust:    #8B3322;
      --burg:    #3E1C1A;
      --burg-dk: #27100D;
      --gold:    #B8935A;
      --gold-lt: #E2C99A;
      --border:  rgba(30,20,10,0.13);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--sand);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* ═══════════════════════ GRID VIEW ═══════════════════════ */

    .grid-header {
      text-align: center;
      padding: 84px 24px 60px;
    }
    .ornament {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 26px;
    }
    .ornament span { display: block; width: 44px; height: 1px; background: var(--gold); opacity: .65; }
    .ornament svg  { width: 13px; height: 13px; fill: var(--gold); opacity: .8; }
    .grid-sup  {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px;
    }
    .grid-h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 4.6rem);
      font-weight: 700; line-height: 1.1; color: var(--ink); margin-bottom: 18px;
    }
    .grid-h1 em { font-style: italic; color: var(--gold); }
    .grid-sub {
      font-size: 14px; color: var(--ink-3); letter-spacing: .3px;
      line-height: 1.85; max-width: 300px; margin: 0 auto;
    }

    .dest-grid {
      max-width: 1120px; margin: 0 auto;
      padding: 28px 20px 80px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    }

    .dest-card {
      position: relative; border-radius: 3px; overflow: hidden;
      cursor: pointer; aspect-ratio: 3/4; background: var(--sand-2);
      opacity: 0; animation: fadeUp .52s ease forwards;
    }
    .dest-card:nth-child(1){animation-delay:.04s} .dest-card:nth-child(2){animation-delay:.08s}
    .dest-card:nth-child(3){animation-delay:.12s} .dest-card:nth-child(4){animation-delay:.16s}
    .dest-card:nth-child(5){animation-delay:.20s} .dest-card:nth-child(6){animation-delay:.24s}
    .dest-card:nth-child(7){animation-delay:.28s} .dest-card:nth-child(8){animation-delay:.32s}
    .dest-card:nth-child(9){animation-delay:.36s}

    .dest-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .65s cubic-bezier(.33,1,.68,1);
    }
    .dest-card:hover img, .dest-card:focus-within img { transform: scale(1.065); }

    .dest-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 38%, rgba(14,8,3,.72) 100%);
      transition: background .35s ease;
    }
    .dest-card:hover .dest-overlay {
      background: linear-gradient(to bottom, rgba(14,8,3,.08) 0%, rgba(14,8,3,.86) 100%);
    }
    .dest-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 22px 20px 20px; }
    .dest-country {
      font-size: 9px; letter-spacing: 3.5px; text-transform: uppercase;
      color: rgba(255,255,255,.6); margin-bottom: 5px;
    }
    .dest-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem; font-weight: 700; color: white; line-height: 1.1;
    }

    /* ═══════════════════════ DETAIL VIEW ═══════════════════════ */

    #view-detail { background: var(--sand); min-height: 100vh; }

    .back-btn {
      position: fixed; top: 18px; left: 20px; z-index: 100;
      background: rgba(234,227,214,.88); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none; cursor: pointer; padding: 8px 14px; border-radius: 2px;
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase; color: var(--ink-2);
      transition: color .2s;
    }
    .back-btn:hover { color: var(--ink); }

    .detail-hero {
      width: 100%; height: 62vh; min-height: 340px;
      overflow: hidden; position: relative;
    }
    .detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 55%, rgba(234,227,214,.5) 100%);
    }

    .wrap { max-width: 680px; margin: 0 auto; padding: 0 24px; }

    /* Intro section */
    .intro-sec  { padding: 36px 0 28px; }
    .tags       { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tag {
      font-size: 9px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase;
      padding: 5px 11px; border: 1px solid var(--border); border-radius: 20px;
      color: var(--ink-2); background: rgba(255,255,255,.4);
    }
    .vibe-lbl {
      font-size: 10px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase;
      color: var(--rust); margin-bottom: 12px;
    }
    .big-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.3rem, 6.5vw, 3.8rem);
      font-weight: 900; line-height: 1.07; color: var(--ink); margin-bottom: 20px;
    }
    .detail-desc {
      font-size: 15px; line-height: 1.78; color: var(--ink-2); margin-bottom: 26px;
    }
    .why-box {
      background: rgba(255,255,255,.45); border: 1px solid var(--border);
      border-radius: 8px; padding: 18px 22px;
    }
    .why-lbl {
      font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 8px;
    }
    .why-text { font-size: 14px; line-height: 1.78; color: var(--ink-2); }

    /* Itinerary section */
    .itin-sec { padding: 44px 0; }
    .sec-sup  {
      font-size: 9px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 10px;
    }
    .sec-h2   {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5vw, 2.9rem);
      font-weight: 700; line-height: 1.14; color: var(--ink); margin-bottom: 22px;
    }
    .day-card { background: var(--sand-2); border-radius: 6px; padding: 17px 20px; margin-bottom: 10px; }
    .day-lbl  {
      font-size: 9px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 7px;
    }
    .day-text { font-size: 14px; line-height: 1.72; color: var(--ink-2); }

    /* Recs section */
    .recs-sec  { padding: 44px 0; }
    .recs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rec-card  { background: var(--sand-2); border-radius: 6px; padding: 16px 18px 15px; }
    .rec-lbl   {
      font-size: 9px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 7px;
    }
    .rec-name  { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.3; margin-bottom: 5px; }
    .rec-desc  { font-size: 12px; color: var(--ink-2); line-height: 1.55; }

    /* Wear section */
    .wear-sec  { padding: 44px 0 52px; }
    .wear-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4.5vw, 2.3rem);
      font-style: italic; font-weight: 400;
      color: var(--ink); line-height: 1.48;
    }

    /* CTA section */
    .cta-sec {
      padding: 56px 0 52px;
      background: linear-gradient(160deg, var(--burg) 0%, var(--burg-dk) 100%);
    }
    .cta-sup {
      font-size: 9px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,.45); margin-bottom: 14px;
    }
    .cta-h {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5.5vw, 3.2rem);
      font-weight: 700; line-height: 1.14; color: white; margin-bottom: 34px;
    }
    .cta-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      padding: 12px 26px; background: white; color: var(--burg);
      border: none; cursor: pointer; border-radius: 2px;
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      padding: 12px 26px; background: transparent; color: white;
      border: 1px solid rgba(255,255,255,.45); cursor: pointer; border-radius: 2px;
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase; transition: border-color .2s;
    }
    .btn-secondary:hover { border-color: white; }

    /* ═══════════════════════ MODAL ═══════════════════════ */

    .modal-back {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(20,12,7,.92); backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .4s ease;
    }
    .modal-back.open { opacity: 1; pointer-events: auto; }

    .modal-box {
      background: var(--sand); max-width: 440px; width: 100%;
      padding: 56px 40px 52px; text-align: center; position: relative;
      transform: translateY(22px) scale(.97);
      transition: transform .5s cubic-bezier(.34,1.4,.64,1);
    }
    .modal-back.open .modal-box { transform: none; }

    .modal-x {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--ink-3); padding: 6px 8px; transition: color .2s;
    }
    .modal-x:hover { color: var(--ink); }

    .modal-heart {
      display: block; font-size: 1.9rem; color: var(--gold); margin-bottom: 20px;
      animation: pulse 1.4s ease infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 28%{transform:scale(1.18)} 55%{transform:scale(1.06)} }

    .modal-lbl {
      font-size: 9px; font-weight: 500; letter-spacing: 4.5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 13px;
    }
    .modal-dest {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700; color: var(--ink); line-height: 1.14; margin-bottom: 24px;
    }
    .modal-rule {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 22px;
    }
    .modal-rule::before, .modal-rule::after {
      content: ''; flex: 1; max-width: 48px; height: 1px; background: var(--gold-lt);
    }
    .modal-rule-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
    .modal-msg {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-style: italic; color: var(--ink-2); line-height: 1.9;
    }

    /* ═══════════════════════ MISC ═══════════════════════ */

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    @media (max-width: 860px) {
      .dest-grid { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 520px) {
      .dest-grid { grid-template-columns: 1fr; gap: 12px; padding: 20px 16px 64px; }
      .grid-h1   { font-size: 2.5rem; }
      .recs-grid { grid-template-columns: 1fr; }
      .cta-btns  { flex-direction: column; }
      .btn-primary, .btn-secondary { text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── GRID VIEW ── -->
  <div id="view-grid">
    <header class="grid-header">
      <div class="ornament" aria-hidden="true">
        <span></span>
        <svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
        <span></span>
      </div>
      <p class="grid-sup">A little something for you</p>
      <h1 class="grid-h1">Where shall <em>we</em> go?</h1>

    </header>
    <div class="dest-grid" id="grid"></div>

  <!-- ── DETAIL VIEW ── -->
  <div id="view-detail" class="hidden"></div>

  <!-- ── MODAL ── -->
  <div class="modal-back" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-dest">
    <div class="modal-box">
      <button class="modal-x" id="modal-x" aria-label="Close">✕</button>
      <span class="modal-heart" aria-hidden="true">♥</span>
      <p class="modal-lbl">You've chosen</p>
      <h2 class="modal-dest" id="modal-dest"></h2>
      <div class="modal-rule" aria-hidden="true"><div class="modal-rule-dot"></div></div>
      <p class="modal-msg">Can't wait to explore the world with you ♥</p>
    </div>
  </div>

    const gridView   = document.getElementById('view-grid');
    const detailView = document.getElementById('view-detail');
    const modal      = document.getElementById('modal');
    const modalDest  = document.getElementById('modal-dest');
    const modalX     = document.getElementById('modal-x');
    const gridEl     = document.getElementById('grid');

    let savedScroll = 0;

    // Build card grid
    DESTINATIONS.forEach((d, i) => {
      const card = document.createElement('article');
      card.className = 'dest-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Explore ${d.name}`);
      card.innerHTML = `
        <img src="https://images.unsplash.com/${d.photo}?auto=format&fit=crop&w=600&q=80"
             alt="${d.name}, ${d.country}" loading="lazy"/>
        <div class="dest-overlay"></div>
        <div class="dest-info">
          <p class="dest-country">${d.country}</p>
          <p class="dest-name">${d.name}</p>
        </div>
      `;
      card.addEventListener('click', () => openDetail(d));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(d); }
      });
      gridEl.appendChild(card);
    });

    function openDetail(d) {
      savedScroll = window.scrollY;
      detailView.innerHTML = buildDetail(d);
      gridView.classList.add('hidden');
      detailView.classList.remove('hidden');
      window.scrollTo(0, 0);
      document.getElementById('back-btn').addEventListener('click', closeDetail);
      document.getElementById('choose-btn').addEventListener('click', () => pick(d.name));
      document.getElementById('keep-btn').addEventListener('click', closeDetail);
    }

    function closeDetail() {
      detailView.classList.add('hidden');
      gridView.classList.remove('hidden');
      window.scrollTo(0, savedScroll);
    }

    function buildDetail(d) {
      return `
        <button id="back-btn" class="back-btn">← BACK TO ALL VIBES</button>

        <div class="detail-hero">
          <img src="https://images.unsplash.com/${d.photo}?auto=format&fit=crop&w=1400&q=85" alt="${d.name}"/>
          <div class="hero-fade"></div>
        </div>

        <section class="intro-sec">
          <div class="wrap">
            <div class="tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <p class="vibe-lbl">${d.vibes}</p>
            <h1 class="big-heading">${d.tagline}</h1>
            <p class="detail-desc">${d.desc}</p>
            <div class="why-box">
              <p class="why-lbl">WHY THIS FITS US</p>
              <p class="why-text">${d.whyUs}</p>
            </div>
          </div>
        </section>

        <section class="itin-sec">
          <div class="wrap">
            <p class="sec-sup">THREE DAYS, IF YOU ARE BRAVE</p>
            <h2 class="sec-h2">The little itinerary</h2>
            ${d.days.map(day => `
              <div class="day-card">
                <p class="day-lbl">${day.lbl}</p>
                <p class="day-text">${day.txt}</p>
              </div>
            `).join('')}
          </div>
        </section>

        <section class="recs-sec">
          <div class="wrap">
            <p class="sec-sup">WHERE I'D TAKE US</p>
            <h2 class="sec-h2">Not a guide. A shortlist<br>with motives.</h2>
            <div class="recs-grid">
              ${d.recs.map(r => `
                <div class="rec-card">
                  <p class="rec-lbl">${r.lbl}</p>
                  <p class="rec-name">${r.name}</p>
                  <p class="rec-desc">${r.desc}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="wear-sec">
          <div class="wrap">
            <p class="sec-sup">WHAT I'D WEAR</p>
            <p class="wear-text"><em>${d.wear}</em></p>
          </div>
        </section>

        <section class="cta-sec">
          <div class="wrap">
            <p class="cta-sup">SO, BABY?</p>
            <h2 class="cta-h">${d.cta}</h2>
            <div class="cta-btns">
              <button id="choose-btn" class="btn-primary">CHOOSE THIS</button>
              <button id="keep-btn" class="btn-secondary">KEEP COMPARING</button>
            </div>
          </div>
        </section>
      `;
    }

    function pick(name) {
      modalDest.textContent = name;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    modalX.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
